<!DOCTYPE html>
<html>
<head>
  <title>{{ category.name }}</title>
</head>
<body>
  <h1>{{ category.name }}</h1>
  <p>{{ category.description }}</p>
  <h2>Товары в этой категории:</h2>
  <ul>
    {% for product in products %}
      <li>
        <a href="{% url 'shop:product_detail' product.id %}">{{ product.name }}</a>
        - {{ product.price }} руб.
      </li>
    {% empty %}
      <li>В этой категории пока нет товаров</li>
    {% endfor %}
  </ul>
  <a href="{% url 'shop:category_list' %}">← Назад к списку категорий</a>
</body>
</html>
