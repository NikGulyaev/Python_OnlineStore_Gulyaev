<!DOCTYPE html>
<html>
<head>
  <title>Список клиентов</title>
</head>
<body>
  <h1>Клиенты</h1>
  <ul>
    {% for customer in customers %}
      <li>
        <a href="{% url 'shop:customer_detail' customer.id %}">
          {{ customer.first_name }} {{ customer.last_name }}
        </a> - {{ customer.email }}
      </li>
    {% empty %}
      <li>Клиентов пока нет</li>
    {% endfor %}
  </ul>
</body>
</html>
